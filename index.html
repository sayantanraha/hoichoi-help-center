<script>
async function fetchNuggetToken() {
  var uid = sessionStorage.getItem('hc_nugget_uid');
  if (!uid) {
    uid = Date.now().toString(36) + Math.random().toString(36).slice(2);
    sessionStorage.setItem('hc_nugget_uid', uid);
  }
  var cached = sessionStorage.getItem('hc_nugget_token');
  if (cached) return cached;
  var res = await fetch('/api/nugget-token?uid=' + encodeURIComponent(uid));
  var data = await res.json();
  if (data.accessToken) {
    sessionStorage.setItem('hc_nugget_token', data.accessToken);
    return data.accessToken;
  }
  throw new Error('Nugget token unavailable');
}

NuggetChat.init({
  accessTokenHandler: fetchNuggetToken,
  position: 'bottom-right',
  initiallyExpanded: false,
  viewType: 'issue',
  bubbleIcon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56"><defs><radialGradient id="hg" cx="35%" cy="30%" r="75%"><stop offset="0%" stop-color="#d20820"/><stop offset="100%" stop-color="#6d0550"/></radialGradient></defs><circle cx="28" cy="28" r="28" fill="url(#hg)"/><text x="28" y="40" font-family="Inter,Arial,sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">h</text></svg>',

  bubbleIconStyles: { width: '56px', height: '56px' },
  chevronColor: '#000000',
});
NuggetChat.hideWidget();
</script>

// ── Article Feedback (Firebase-wired) ─────────────────────────────────────────
const ArticleFeedback = ({ articleId, initialLikes, initialDislikes, lang = 'en' }) => {
  const S = STRINGS[lang];
  const [vote, setVote] = useState(() => localStorage.getItem(`hc_vote_${articleId}`));
  const [likes, setLikes] = useState(initialLikes);
  const [dislikes, setDislikes] = useState(initialDislikes);
  const [showFeedback, setShowFeedback] = useState(false);
  const [reason, setReason] = useState('');
  const [feedback, setFeedback] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [loading, setLoading] = useState(false);

  // Fetch live counts from Firestore on mount
  useEffect(() => {
    db.collection('articleFeedback').doc(articleId).get()
      .then(doc => {
        if (doc.exists) {
          const d = doc.data();
          if (d.likes !== undefined)    setLikes(d.likes);
          if (d.dislikes !== undefined) setDislikes(d.dislikes);
        }
      })
      .catch(() => {});
  }, [articleId]);

  const handleVote = async (v) => {
    if (loading) return;
    const prevVote = vote;
    const newVote = prevVote === v ? null : v;

    // Optimistic UI
    if (prevVote === 'like')    setLikes(l => l - 1);
    if (prevVote === 'dislike') setDislikes(d => d - 1);
    if (newVote === 'like')     setLikes(l => l + 1);
    if (newVote === 'dislike')  setDislikes(d => d + 1);
    setVote(newVote);
    if (newVote === 'dislike') setShowFeedback(true);
    else setShowFeedback(false);
    if (newVote) localStorage.setItem(`hc_vote_${articleId}`, newVote);
    else localStorage.removeItem(`hc_vote_${articleId}`);

    // Firestore update
    setLoading(true);
    try {
      const ref = db.collection('articleFeedback').doc(articleId);
      const inc = firebase.firestore.FieldValue.increment;
      const updates = {};
      if (prevVote === 'like')    updates.likes    = inc(-1);
      if (prevVote === 'dislike') updates.dislikes = inc(-1);
      if (newVote === 'like')     updates.likes    = inc(1);
      if (newVote === 'dislike')  updates.dislikes = inc(1);
      if (Object.keys(updates).length > 0) await ref.set(updates, { merge: true });
    } catch (e) {}
    setLoading(false);
  };

  const submitFeedback = async () => {
    try {
      await db.collection('articleFeedbackText').add({
        articleId, reason, feedback, vote, createdAt: Date.now(),
      });
    } catch (e) {}
    setSubmitted(true);
    setShowFeedback(false);
  };

  if (submitted) return (
    <div style={{ borderTop: '1.5px solid var(--border)', paddingTop: 24, marginTop: 32 }}>
      <p style={{ color: '#16A34A', fontSize: 13, fontWeight: 500 }}>
        <Icon name="checkCircle" size={14} style={{ marginRight: 6 }} /> {S.feedbackThanks}
      </p>
    </div>
  );

  return (
    <div style={{ borderTop: '1.5px solid var(--border)', paddingTop: 24, marginTop: 32 }}>
      <p style={{ color: 'var(--text-2)', fontSize: 14, fontWeight: 500, marginBottom: 12 }}>{S.wasHelpful}</p>
      <div className="flex items-center gap-3 flex-wrap">
        <button onClick={() => handleVote('like')}
          className={`like-btn flex items-center gap-2 px-4 py-2 rounded-lg border text-sm font-medium cursor-pointer transition-all ${vote === 'like' ? 'like-active' : ''}`}
          style={{ background: 'var(--surface2)', color: 'var(--text-2)', borderColor: 'var(--border)' }}>
          <Icon name="thumbUp" size={15} /> {S.yesHelped}
          <span style={{ color: 'var(--text-3)', marginLeft: 2 }}>({likes})</span>
        </button>
        <button onClick={() => handleVote('dislike')}
          className={`dislike-btn flex items-center gap-2 px-4 py-2 rounded-lg border text-sm font-medium cursor-pointer transition-all ${vote === 'dislike' ? 'dislike-active' : ''}`}
          style={{ background: 'var(--surface2)', color: 'var(--text-2)', borderColor: 'var(--border)' }}>
          <Icon name="thumbDown" size={15} /> {S.notReally}
          <span style={{ color: 'var(--text-3)', marginLeft: 2 }}>({dislikes})</span>
        </button>
      </div>
      {vote === 'like' && !showFeedback && (
        <p style={{ color: '#16A34A', fontSize: 13, marginTop: 10, fontWeight: 500 }}>
          <Icon name="check" size={13} style={{ marginRight: 4 }} /> {S.thanksFeedback}
        </p>
      )}
      {showFeedback && (
        <div className="fade-in" style={{ marginTop: 14, maxWidth: 480 }}>
          <p style={{ color: 'var(--text-2)', fontSize: 13, fontWeight: 500, marginBottom: 8 }}>{S.feedbackReasonLabel}</p>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 14 }}>
            {FEEDBACK_REASONS.map(r => {
              const label = lang === 'bn' ? r.labelBn : r.labelEn;
              const selected = reason === r.value;
              return (
                <button key={r.value} type="button" onClick={() => setReason(r.value)}
                  style={{
                    padding: '6px 14px', borderRadius: 20, fontSize: 13, fontWeight: 500, cursor: 'pointer',
                    border: selected ? '1.5px solid var(--accent)' : '1.5px solid var(--border)',
                    background: selected ? 'rgba(210,8,32,0.08)' : 'var(--surface2)',
                    color: selected ? 'var(--accent)' : 'var(--text-2)',
                    transition: 'all 0.15s',
                  }}>
                  {label}
                </button>
              );
            })}
          </div>
          <p style={{ color: 'var(--text-2)', fontSize: 13, marginBottom: 8 }}>{S.whatMissing}</p>
          <textarea value={feedback} onChange={e => setFeedback(e.target.value)}
            placeholder={S.feedbackPlaceholder}
            rows={3} className="form-textarea" style={{ maxWidth: 480 }} />
          <div className="flex gap-2 mt-2">
            <button onClick={submitFeedback} disabled={!reason}
              className="btn-primary px-4 py-2 rounded-lg text-sm font-medium"
              style={{ opacity: reason ? 1 : 0.45, cursor: reason ? 'pointer' : 'not-allowed' }}>
              {S.submitFeedback}
            </button>
            <button onClick={() => { setSubmitted(true); setShowFeedback(false); }}
              style={{ color: 'var(--text-3)', background: 'transparent', border: 'none', fontSize: 13, cursor: 'pointer' }}>
              {S.skipFeedback}
            </button>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Ticket Modal ──────────────────────────────────────────────────────────────
const TicketModal = ({ onClose, lang = 'en' }) => {
  const S = STRINGS[lang];
  const [form, setForm] = useState({
    name: '', email: '', countryCode: '+91', phone: '',
    category: '', subcategory: '', device: '', description: '',
  });
  const [file, setFile] = useState(null);
  const [errors, setErrors] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef();

  const selectedCat = FORM_CATEGORIES.find(c => c.id === form.category);

  const needsDevice = selectedCat && (
    selectedCat.deviceTriggerAll ||
    (selectedCat.deviceTriggerSubs || []).includes(form.subcategory)
  );

  const needsAttachment = selectedCat && form.subcategory &&
    (selectedCat.attachmentTriggerSubs || []).includes(form.subcategory);

  const set = (k, v) => {
    setForm(f => ({ ...f, [k]: v }));
    setErrors(e => ({ ...e, [k]: '' }));
  };

  const handleCategoryChange = (v) => {
    setForm(f => ({ ...f, category: v, subcategory: '', device: '' }));
    setErrors(e => ({ ...e, category: '', subcategory: '', device: '' }));
    setFile(null);
  };

  const handleFile = (f) => {
    if (!f) return;
    const allowed = ['image/jpeg', 'image/png', 'image/webp', 'image/gif', 'application/pdf'];
    if (!allowed.includes(f.type)) { setErrors(e => ({ ...e, file: S.errFileType })); return; }
    if (f.size > 5 * 1024 * 1024)  { setErrors(e => ({ ...e, file: S.errFileSize })); return; }
    setFile(f);
    setErrors(e => ({ ...e, file: '' }));
  };

  const validate = () => {
    const e = {};
    if (!form.name.trim())        e.name = S.errName;
    if (!form.email.trim())       e.email = S.errEmail;
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = S.errEmailInvalid;
    if (!form.phone.trim())       e.phone = S.errPhone;
    else if (!/^\d{6,15}$/.test(form.phone.replace(/\s/g,''))) e.phone = S.errPhoneInvalid;
    if (!form.category)           e.category = S.errCategory;
    if (!form.subcategory)        e.subcategory = S.errSubcategory;
    if (needsDevice && !form.device) e.device = S.errDevice;
    if (!form.description.trim()) e.description = S.errDescription;
    else if (form.description.trim().length < 20) e.description = S.errDescriptionMin;
    if (needsAttachment && !file) e.file = S.errAttachment;
    return e;
  };

  const toBase64 = (f) => new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload  = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(f);
  });

  const handleSubmit = async () => {
    const e = validate();
    if (Object.keys(e).length > 0) { setErrors(e); return; }
    setSubmitting(true);
    try {
      let attachment = null;
      if (file) {
        const base64 = await toBase64(file);
        attachment = { base64, name: file.name, type: file.type };
      }
      const payload = {
        name: form.name.trim(),
        email: form.email.trim(),
        phone: `${form.countryCode} ${form.phone.trim()}`,
        category: selectedCat?.label || form.category,
        subcategory: form.subcategory,
        device: form.device || null,
        description: form.description.trim(),
        attachment,
      };
      const res = await fetch('/api/send-ticket', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error('Server error');
      setSubmitted(true);
    } catch (err) {
      setErrors({ submit: S.errSubmit });
    }
    setSubmitting(false);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box slide-up">
        {/* Header */}
        <div style={{ padding: '20px 24px 16px', borderBottom: '1.5px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <p style={{ color: 'var(--text-1)', fontWeight: 700, fontSize: 17 }}>{S.ticketTitle}</p>
            <p style={{ color: 'var(--text-3)', fontSize: 12, marginTop: 2 }}>{S.ticketSubtitle}</p>
          </div>
          <button onClick={onClose} style={{ background: 'var(--surface2)', border: '1.5px solid var(--border)', borderRadius: 8, width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: 'var(--text-2)' }}>
            <Icon name="x" size={16} />
          </button>
        </div>

        {submitted ? (
          <div style={{ padding: '48px 24px', textAlign: 'center' }}>
            <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'rgba(22,163,74,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', color: '#16A34A' }}>
              <Icon name="checkCircle" size={32} />
            </div>
            <p style={{ color: 'var(--text-1)', fontWeight: 700, fontSize: 18, marginBottom: 8 }}>{S.ticketSuccess}</p>
            <p style={{ color: 'var(--text-2)', fontSize: 14, lineHeight: 1.6, maxWidth: 380, margin: '0 auto 24px' }}>
              {S.ticketSuccessMsg(form.email)}
            </p>
            <button onClick={onClose} className="btn-primary px-6 py-2.5 rounded-xl font-semibold" style={{ fontSize: 14 }}>
              {S.doneBtn}
            </button>
          </div>
        ) : (
          <div style={{ padding: '20px 24px 24px', display: 'flex', flexDirection: 'column', gap: 16, maxHeight: '80vh', overflowY: 'auto' }}>

            {/* Name */}
            <div>
              <label className="form-label">{S.fullName} <span className="req">*</span></label>
              <input value={form.name} onChange={e => set('name', e.target.value)} className="form-input" placeholder={S.namePlaceholder} />
              {errors.name && <p className="field-error">{errors.name}</p>}
            </div>

            {/* Email */}
            <div>
              <label className="form-label">{S.emailAddress} <span className="req">*</span></label>
              <input type="email" value={form.email} onChange={e => set('email', e.target.value)} className="form-input" placeholder={S.emailPlaceholder} />
              {errors.email && <p className="field-error">{errors.email}</p>}
            </div>

            {/* Phone */}
            <div>
              <label className="form-label">{S.mobileNumber} <span className="req">*</span></label>
              <div className="flex gap-2">
                <div style={{ position: 'relative', flexShrink: 0 }}>
                  <select value={form.countryCode} onChange={e => set('countryCode', e.target.value)}
                    className="form-select" style={{ paddingRight: 28, minWidth: 140 }}>
                    {COUNTRY_CODES.map(c => <option key={c.code} value={c.code}>{c.label}</option>)}
                  </select>
                  <div style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none', color: 'var(--text-3)' }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                  </div>
                </div>
                <input value={form.phone} onChange={e => set('phone', e.target.value.replace(/\D/g,''))}
                  className="form-input" placeholder={S.phonePlaceholder} style={{ flex: 1 }} maxLength={15} />
              </div>
              {errors.phone && <p className="field-error">{errors.phone}</p>}
            </div>

            {/* Category */}
            <div>
              <label className="form-label">{S.issueCategory} <span className="req">*</span></label>
              <div style={{ position: 'relative' }}>
                <select value={form.category} onChange={e => handleCategoryChange(e.target.value)} className="form-select" style={{ paddingRight: 28 }}>
                  <option value="">{S.categoryPlaceholder}</option>
                  {FORM_CATEGORIES.map(c => <option key={c.id} value={c.id}>{lang === 'bn' ? FORM_CATEGORIES_LABELS_BN[c.id] : c.label}</option>)}
                </select>
                <div style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none', color: 'var(--text-3)' }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
              </div>
              {errors.category && <p className="field-error">{errors.category}</p>}
            </div>

            {/* Subcategory */}
            {form.category && (
              <div className="fade-in">
                <label className="form-label">{S.issueType} <span className="req">*</span></label>
                <div style={{ position: 'relative' }}>
                  <select value={form.subcategory} onChange={e => { set('subcategory', e.target.value); setFile(null); }} className="form-select" style={{ paddingRight: 28 }}>
                    <option value="">{S.issueTypePlaceholder}</option>
                    {(selectedCat?.subs || []).map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                  <div style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none', color: 'var(--text-3)' }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                  </div>
                </div>
                {errors.subcategory && <p className="field-error">{errors.subcategory}</p>}
              </div>
            )}

            {/* Device — conditional */}
            {needsDevice && (
              <div className="fade-in">
                <label className="form-label">{S.deviceLabel} <span className="req">*</span></label>
                <div style={{ position: 'relative' }}>
                  <select value={form.device} onChange={e => set('device', e.target.value)} className="form-select" style={{ paddingRight: 28 }}>
                    <option value="">{S.devicePlaceholder}</option>
                    {DEVICES.map(d => <option key={d} value={d}>{d}</option>)}
                  </select>
                  <div style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none', color: 'var(--text-3)' }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                  </div>
                </div>
                {errors.device && <p className="field-error">{errors.device}</p>}
              </div>
            )}

            {/* Description */}
            <div>
              <label className="form-label">{S.describeIssue} <span className="req">*</span></label>
              <textarea value={form.description} onChange={e => set('description', e.target.value)}
                className="form-textarea" placeholder={S.descriptionPlaceholder} rows={4} />
              <div className="flex justify-between mt-1">
                {errors.description
                  ? <p className="field-error">{errors.description}</p>
                  : <span />}
                <span style={{ color: 'var(--text-3)', fontSize: 11 }}>{form.description.length} {S.charsLabel}</span>
              </div>
            </div>

            {/* Attachment */}
            <div>
              <label className="form-label">
                {S.attachmentLabel} {needsAttachment ? <span className="req">*</span> : <span style={{ color: 'var(--text-3)', fontWeight: 400 }}>{S.optionalLabel}</span>}
              </label>
              {needsAttachment && (
                <div className="flex items-start gap-2 mb-2 p-3 rounded-lg" style={{ background: 'rgba(210,8,32,0.06)', border: '1px solid rgba(210,8,32,0.2)' }}>
                  <Icon name="alertCircle" size={14} style={{ color: 'var(--accent)', marginTop: 1, flexShrink: 0 }} />
                  <p style={{ color: 'var(--accent)', fontSize: 12, fontWeight: 500 }}>
                    {S.attachmentRequiredMsg}
                  </p>
                </div>
              )}
              <div
                className={`upload-zone ${dragOver ? 'dragging' : ''} ${file ? 'has-file' : ''}`}
                onClick={() => fileRef.current?.click()}
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
              >
                <input ref={fileRef} type="file" accept="image/*,.pdf" style={{ display: 'none' }}
                  onChange={e => handleFile(e.target.files[0])} />
                {file ? (
                  <div className="flex items-center justify-between gap-3">
                    <div className="flex items-center gap-2">
                      <Icon name="paperclip" size={16} style={{ color: '#16A34A' }} />
                      <div>
                        <p style={{ color: '#16A34A', fontSize: 13, fontWeight: 600 }}>{file.name}</p>
                        <p style={{ color: 'var(--text-3)', fontSize: 11 }}>{(file.size / 1024).toFixed(0)} KB</p>
                      </div>
                    </div>
                    <button onClick={e => { e.stopPropagation(); setFile(null); }}
                      style={{ color: 'var(--text-3)', background: 'none', border: 'none', cursor: 'pointer' }}>
                      <Icon name="x" size={14} />
                    </button>
                  </div>
                ) : (
                  <div>
                    <Icon name="upload" size={22} style={{ color: 'var(--text-3)', marginBottom: 8 }} />
                    <p style={{ color: 'var(--text-2)', fontSize: 13, fontWeight: 500 }}>{S.uploadPrompt}</p>
                    <p style={{ color: 'var(--text-3)', fontSize: 12, marginTop: 3 }}>{S.uploadHint}</p>
                  </div>
                )}
              </div>
              {errors.file && <p className="field-error">{errors.file}</p>}
            </div>

            {/* Submit error */}
            {errors.submit && (
              <div className="flex items-start gap-2 p-3 rounded-lg" style={{ background: 'rgba(220,38,38,0.06)', border: '1px solid rgba(220,38,38,0.2)' }}>
                <Icon name="alertCircle" size={14} style={{ color: '#DC2626', marginTop: 1 }} />
                <p style={{ color: '#DC2626', fontSize: 13 }}>{errors.submit}</p>
              </div>
            )}

            {/* Submit */}
            <button onClick={handleSubmit} disabled={submitting}
              className="btn-primary flex items-center justify-center gap-2 rounded-xl font-semibold"
              style={{ padding: '12px 24px', fontSize: 15, opacity: submitting ? 0.7 : 1, marginTop: 4 }}>
              {submitting ? <><Icon name="loader" size={16} /> {lang === 'bn' ? 'সাবমিট হচ্ছে…' : 'Submitting…'}</> : <><Icon name="ticket" size={16} /> {S.submitTicket}</>}
            </button>

            <p style={{ color: 'var(--text-3)', fontSize: 12, textAlign: 'center' }}>
              {S.orEmail} <a href="mailto:support@hoichoi.tv" style={{ color: 'var(--accent)', textDecoration: 'none' }}>support@hoichoi.tv</a>
            </p>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Topbar ────────────────────────────────────────────────────────────────────
const Topbar = ({ theme, setTheme, lang, setLang, navigate, onOpenTicket, currentView }) => {
  const [mobileOpen, setMobileOpen] = React.useState(false);
  const S = STRINGS[lang];
  const navItems = [
    { label: S.getStarted, view: 'getstarted' },
    { label: S.helpArticles, view: 'home' },
    { label: S.videoLibrary, view: 'videos' },
  ];
  const goTo = (view) => { navigate({ view }); setMobileOpen(false); };
  // 'home' nav item is active for home, category, article and search views
  const isActive = (view) => view === 'home'
    ? ['home', 'category', 'article', 'search'].includes(currentView)
    : currentView === view;

  return (
    <div className="topbar">
      {/* ── Main bar ── */}
      <div className="topbar-inner">

        {/* LEFT: Brand — logo + divider + title as one tight unit */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, cursor: 'pointer', userSelect: 'none' }}
          onClick={() => goTo('home')}>
          {/* CSS gradient text — no SVG, no invisible whitespace */}
          <span className="topbar-logo">hoichoi</span>
          <div className="topbar-divider" />
          <span className="topbar-brand-title">{S.helpCenter}</span>
        </div>

        {/* CENTER: Nav links — desktop only, pushed right of brand */}
        <nav className="topbar-nav" aria-label="Main navigation">
          {navItems.map(item => (
            <button key={item.view}
              className={`topbar-nav-link${isActive(item.view) ? ' topbar-nav-link-active' : ''}`}
              onClick={() => goTo(item.view)}>
              {item.label}
            </button>
          ))}
        </nav>

        {/* RIGHT: Controls — auto-pushed to far right */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginLeft: 'auto', flexShrink: 0 }}>
          {/* Language toggle */}
          <button onClick={() => setLang(l => l === 'en' ? 'bn' : 'en')}
            className="topbar-lang btn-ghost"
            style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 13, height: 36, padding: '0 12px', borderRadius: 8, fontWeight: 500 }}>
            <Icon name="globe" size={14} />
            <span className="topbar-lang-text">{lang === 'en' ? 'বাংলা' : 'English'}</span>
          </button>

          {/* Theme toggle */}
          <button onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')}
            style={{ background: 'var(--surface2)', border: '1.5px solid var(--border)', borderRadius: 8, width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: 'var(--text-2)', flexShrink: 0, transition: 'background 0.15s' }}>
            <Icon name={theme === 'dark' ? 'sun' : 'moon'} size={15} />
          </button>

          {/* Raise a Ticket */}
          <button onClick={onOpenTicket}
            className="btn-primary topbar-ticket"
            style={{ alignItems: 'center', gap: 6, fontSize: 13, height: 36, padding: '0 16px', borderRadius: 8, fontWeight: 600, flexShrink: 0 }}>
            <Icon name="ticket" size={14} />
            <span className="topbar-btn-text">{S.raiseTicketBtn}</span>
          </button>

          {/* Hamburger — mobile / tablet only */}
          <button className="topbar-hamburger btn-ghost"
            onClick={() => setMobileOpen(o => !o)}
            aria-label={mobileOpen ? 'Close menu' : 'Open menu'}
            style={{ borderRadius: 8, cursor: 'pointer', color: 'var(--text-2)' }}>
            {mobileOpen
              ? <Icon name="x" size={18} />
              : <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
                  <line x1="0" y1="1" x2="18" y2="1"/>
                  <line x1="0" y1="7" x2="18" y2="7"/>
                  <line x1="0" y1="13" x2="18" y2="13"/>
                </svg>}
          </button>
        </div>
      </div>

      {/* ── Mobile dropdown menu ── */}
      {mobileOpen && (
        <div className="topbar-mobile-menu fade-in">
          {navItems.map(item => (
            <button key={item.view} onClick={() => goTo(item.view)}>
              {item.label}
            </button>
          ))}
          <div style={{ height: 1, background: 'var(--border)', margin: '8px 24px' }} />
          <button onClick={() => { setLang(l => l === 'en' ? 'bn' : 'en'); }}
            style={{ display: 'flex', alignItems: 'center', gap: 8, color: 'var(--text-2)', fontSize: 14 }}>
            <Icon name="globe" size={14} />
            {lang === 'en' ? 'বাংলায় দেখুন' : 'View in English'}
          </button>
        </div>
      )}
    </div>
  );
};

// ── Content renderer ──────────────────────────────────────────────────────────
const renderContent = (text) => {
  if (!text) return <p style={{ color: 'var(--text-2)' }}>Article content coming soon.</p>;
  return text.split('\n').map((line, i) => {
    if (line.startsWith('**') && line.endsWith('**'))
      return <h3 key={i} style={{ color: 'var(--text-1)', fontWeight: 700, fontSize: 15, marginTop: 24, marginBottom: 8 }}>{line.slice(2,-2)}</h3>;
    if (line.startsWith('---'))
      return <hr key={i} style={{ borderColor: 'var(--border)', marginTop: 24, marginBottom: 20 }} />;
    if (/^\d+\./.test(line))
      return <div key={i} style={{ display: 'flex', gap: 10, marginBottom: 8 }}>
        <span style={{ background: 'linear-gradient(135deg,#d20820,#6d0550)', color: '#fff', width: 22, height: 22, borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, flexShrink: 0, marginTop: 1 }}>
          {line.match(/^(\d+)/)[1]}
        </span>
        <p style={{ color: 'var(--text-1)', fontSize: 14, lineHeight: 1.65, margin: 0 }}
          dangerouslySetInnerHTML={{ __html: line.replace(/^\d+\.\s*/,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>') }} />
      </div>;
    if (line.startsWith('- '))
      return <div key={i} style={{ display: 'flex', gap: 10, marginBottom: 6 }}>
        <span style={{ color: 'var(--accent)', fontWeight: 700, flexShrink: 0, marginTop: 1 }}>•</span>
        <p style={{ color: 'var(--text-1)', fontSize: 14, lineHeight: 1.65, margin: 0 }}
          dangerouslySetInnerHTML={{ __html: line.slice(2).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>') }} />
      </div>;
    const imgMatch = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if (imgMatch)
      return <img key={i} src={imgMatch[2]} alt={imgMatch[1]}
        style={{ maxWidth: '100%', borderRadius: 10, margin: '12px 0', display: 'block', border: '1px solid var(--border)' }} />;
    if (!line.trim()) return <div key={i} style={{ height: 6 }} />;
    return <p key={i} style={{ color: 'var(--text-1)', fontSize: 14, lineHeight: 1.75, marginBottom: 8 }}
      dangerouslySetInnerHTML={{ __html: line.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>') }} />;
  });
};

const HomeView = ({ navigate, lang, onOpenTicket, allArticles, popularArticles, categories, siteQuickSearches }) => {
  const S = STRINGS[lang];
  const [query, setQuery] = useState('');
  const [dropdownOpen, setDropdownOpen] = useState(false);
  const searchRef = useRef(null);

  const categoryCounts = useMemo(() => {
    const counts = {};
    for (const a of allArticles) {
      const cid = a.categoryId || a.category;
      if (cid) counts[cid] = (counts[cid] || 0) + 1;
    }
    return counts;
  }, [allArticles]);

  const liveResults = useMemo(() => {
    if (!query || query.trim().length < 2) return [];
    const q = query.toLowerCase();
    const titleHits = [], bodyHits = [];
    for (const a of allArticles) {
      const inTitle = a.title.toLowerCase().includes(q) || (a.titleBn && a.titleBn.includes(q));
      const inBody  = !inTitle && a.content && a.content.toLowerCase().includes(q);
      const item = { ...a, catId: (a.categories && a.categories[0]) || a.categoryId || a.category, type: 'article' };
      if (inTitle) titleHits.push(item);
      else if (inBody) bodyHits.push(item);
    }
    const videoHits = [];
    for (const v of VIDEOS) {
      if (v.title.toLowerCase().includes(q) || v.titleBn.includes(q))
        videoHits.push({ ...v, type: 'video' });
    }
    return [...titleHits, ...bodyHits, ...videoHits].slice(0, 8);
  }, [query, allArticles]);

  useEffect(() => {
    setDropdownOpen(liveResults.length > 0);
  }, [liveResults]);

  // Close dropdown on outside click
  useEffect(() => {
    const handler = (e) => { if (searchRef.current && !searchRef.current.contains(e.target)) setDropdownOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  return (
    <div className="fade-in">
      <div className="hero-gradient" style={{ padding: '48px 24px 56px' }}>
        <div style={{ maxWidth: 680, margin: '0 auto', textAlign: 'center' }}>
          <h1 style={{ color: '#fff', fontSize: 34, fontWeight: 800, letterSpacing: '-0.5px', marginBottom: 10 }}>{S.heroTitle}</h1>
          <p style={{ color: 'rgba(255,255,255,0.8)', fontSize: 15, marginBottom: 28 }}>{S.heroSubtitle}</p>
          <div ref={searchRef} style={{ position: 'relative', maxWidth: 520, margin: '0 auto' }}>
            <div style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)', color: 'rgba(0,0,0,0.4)', zIndex: 1 }}>
              <Icon name="search" size={18} />
            </div>
            <input value={query}
              onChange={e => { setQuery(e.target.value); }}
              onKeyDown={e => { if (e.key === 'Enter' && query.trim()) { setDropdownOpen(false); navigate({ view: 'search', query }); } }}
              onFocus={() => liveResults.length > 0 && setDropdownOpen(true)}
              placeholder={S.searchPlaceholder}
              style={{ width: '100%', height: 52, paddingLeft: 48, paddingRight: 100, borderRadius: dropdownOpen ? '14px 14px 0 0' : 14, border: 'none', fontSize: 15, color: '#0F172A', background: '#fff', boxShadow: '0 4px 20px rgba(0,0,0,0.2)', outline: 'none', position: 'relative' }} />
            <button onClick={() => { if (query.trim()) { setDropdownOpen(false); navigate({ view: 'search', query }); } }}
              style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', background: 'linear-gradient(135deg,#d20820,#6d0550)', color: '#fff', border: 'none', borderRadius: 10, height: 36, paddingInline: 16, fontWeight: 600, fontSize: 13, cursor: 'pointer', zIndex: 1 }}>
              {S.searchBtn}
            </button>
            {dropdownOpen && (
              <div className="search-dropdown" style={{ borderTop: '1px solid #E4E8F0', borderRadius: '0 0 14px 14px', textAlign: 'left' }}>
                {liveResults.map((r, i) => (
                  <div key={r.id + i} className="search-dropdown-item"
                    style={{ padding: '10px 16px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10, borderBottom: i < liveResults.length - 1 ? '1px solid var(--border)' : 'none' }}
                    onMouseDown={() => {
                      setDropdownOpen(false);
                      setQuery('');
                      if (r.type === 'article') navigate({ view: 'article', articleId: r.id, catId: r.catId });
                      else navigate({ view: 'videos' });
                    }}>
                    <Icon name={r.type === 'video' ? 'play' : 'search'} size={13} style={{ color: 'var(--text-3)', flexShrink: 0 }} />
                    <span style={{ fontSize: 14, color: '#0F172A', flex: 1 }}>{lang === 'bn' ? r.titleBn : r.title}</span>
                    <span style={{ fontSize: 11, color: '#94A3B8', flexShrink: 0 }}>{r.type === 'video' ? S.videoLabel : categories.find(c => c.id === r.catId)?.label}</span>
                  </div>
                ))}
                {query.trim().length >= 2 && (
                  <div style={{ padding: '10px 16px', borderTop: '1px solid #E4E8F0' }}
                    className="search-dropdown-item" style={{ padding: '10px 16px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8 }}
                    onMouseDown={() => { setDropdownOpen(false); navigate({ view: 'search', query }); }}>
                    <Icon name="search" size={13} style={{ color: 'var(--accent)', flexShrink: 0 }} />
                    <span style={{ fontSize: 13, color: 'var(--accent)', fontWeight: 500 }}>{S.seeAllResultsFor} "{query}"</span>
                  </div>
                )}
              </div>
            )}
          </div>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginTop: 16, flexWrap: 'wrap' }}>
            {(siteQuickSearches || S.quickSearches.map((en, i) => ({ en, bn: STRINGS.bn.quickSearches[i] }))).map((q, idx) => (
              <button key={idx} onClick={() => navigate({ view: 'search', query: q.en })}
                style={{ background: 'rgba(255,255,255,0.18)', border: '1px solid rgba(255,255,255,0.3)', borderRadius: 999, color: '#fff', fontSize: 12, fontWeight: 500, padding: '5px 14px', cursor: 'pointer' }}>
                {lang === 'bn' ? (q.bn || q.en) : q.en}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '40px 24px 60px' }}>
        <h2 style={{ color: 'var(--text-1)', fontWeight: 700, fontSize: 20, marginBottom: 20 }}>{S.browseByCategory}</h2>
        <div className="category-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 14 }}>
          {categories.map(cat => (
            <div key={cat.id} className="category-card cursor-pointer transition-all"
              onClick={() => navigate({ view: 'category', catId: cat.id })}
              style={{ background: 'var(--surface)', border: '1.5px solid var(--border)', borderRadius: 14, padding: 20, boxShadow: 'var(--shadow)', transition: 'transform 0.18s, box-shadow 0.18s' }}>
              <div style={{ width: 48, height: 48, borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', background: cat.color + '18', marginBottom: 12, color: cat.color }}><Icon name={cat.icon} size={26} /></div>
              <p style={{ color: 'var(--text-1)', fontWeight: 600, fontSize: 14, marginBottom: 4 }}>{lang === 'bn' ? cat.labelBn : cat.label}</p>
              <p style={{ color: 'var(--text-3)', fontSize: 12 }}>{categoryCounts[cat.id] ?? cat.count} {S.articlesLabel}</p>
            </div>
          ))}
        </div>

        <div style={{ marginTop: 48 }}>
          <h2 style={{ color: 'var(--text-1)', fontWeight: 700, fontSize: 20, marginBottom: 20 }}>{S.popularArticles}</h2>
          <div style={{ background: 'var(--surface)', border: '1.5px solid var(--border)', borderRadius: 14, overflow: 'hidden', boxShadow: 'var(--shadow)' }}>
            {popularArticles.map((a, i) => {
              const cat = categories.find(c => c.id === a.catId);
              return (
                <div key={a.id} className="article-card cursor-pointer flex items-center gap-4"
                  onClick={() => navigate({ view: 'article', articleId: a.id, catId: a.catId })}

                  <span style={{ color: 'var(--text-1)', fontSize: 14, fontWeight: 500, flex: 1 }}>{lang === 'bn' ? (a.titleBn || a.title) : a.title}</span>
                  <div className="flex items-center gap-2">

const ArticleView = ({ articleId, catId, navigate, lang, onOpenTicket, allArticles, categories }) => {
  const S = STRINGS[lang];
  const cat = categories.find(c => c.id === catId);
  const catArticles = allArticles.filter(a => (a.categories || [a.categoryId || a.category]).includes(catId));
  const articleMeta = allArticles.find(a => a.id === articleId) || {};
  const [fsContent, setFsContent] = useState(null);
  const [translatedContent, setTranslatedContent] = useState(null);
  const [translating, setTranslating] = useState(false);

  useEffect(() => {
    setFsContent(null);
    setTranslatedContent(null);
    db.collection('articles').doc(articleId).get()
      .then(doc => { if (doc.exists && doc.data().published !== false) setFsContent(doc.data()); })
      .catch(() => {});
  }, [articleId]);

  useEffect(() => {
    if (lang !== 'bn') { setTranslatedContent(null); return; }
    const rawContent = (fsContent || ARTICLE_CONTENT[articleId])?.content;
    if (!rawContent) return;
    const cacheKey = `hc_trans_${articleId}`;
    const cached = localStorage.getItem(cacheKey);
    if (cached) { setTranslatedContent(cached); return; }
    setTranslating(true);
    fetch('/api/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: rawContent, target: 'bn' }),
    })
      .then(r => r.json())
      .then(data => {
        if (data.translated) {
          localStorage.setItem(cacheKey, data.translated);
          setTranslatedContent(data.translated);
        }
      })
      .catch(() => {})
      .finally(() => setTranslating(false));
  }, [lang, articleId, fsContent]);

  const content = fsContent || ARTICLE_CONTENT[articleId];
  const relatedIds = content?.relatedArticles || articleMeta.relatedArticles || [];
  const relatedArticles = relatedIds.map(id => {
    const found = allArticles.find(a => a.id === id);
    if (found) return { ...found, catId: (found.categories && found.categories[0]) || found.categoryId || found.category };
    for (const [cId, arts] of Object.entries(ARTICLES)) {
      const fb = arts.find(a => a.id === id);
      if (fb) return { ...fb, catId: cId };
    }
    return null;
  }).filter(Boolean);
  const title = lang === 'bn' ? (articleMeta.titleBn || content?.titleBn || content?.title) : (content?.title || articleMeta.title);

  return (
    <div className="fade-in article-grid">
      <div>
        <div className="flex items-center gap-2 mb-6" style={{ fontSize: 13, color: 'var(--text-3)' }}>
          <span className="cursor-pointer" style={{ color: 'var(--accent)' }} onClick={() => navigate({ view: 'home' })}>{S.knowledgeBase}</span>
          <span>/</span>
          <span className="cursor-pointer" style={{ color: 'var(--accent)' }} onClick={() => navigate({ view: 'category', catId })}>{lang === 'bn' ? (cat?.labelBn || cat?.label) : cat?.label}</span>
          <span>/</span>
          <span style={{ color: 'var(--text-2)' }}>{S.articleBreadcrumb}</span>
        </div>
        <div style={{ background: 'var(--surface)', border: '1.5px solid var(--border)', borderRadius: 16, padding: 32, boxShadow: 'var(--shadow)' }}>
          <div className="flex items-center gap-2 mb-4 flex-wrap">
            <span style={{ background: cat?.color + '18', color: cat?.color, padding: '3px 10px', borderRadius: 999, fontSize: 12, fontWeight: 600 }}>{lang === 'bn' ? (cat?.labelBn || cat?.label) : cat?.label}</span>
            {articleMeta.tag && <span className={`tag ${articleMeta.tag === 'new' ? 'tag-new' : 'tag-popular'}`}>{articleMeta.tag}</span>}
            <span style={{ color: 'var(--text-3)', fontSize: 12, marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 4 }}>
              <Icon name="clock" size={12} /> {articleMeta.readTime}
            </span>
          </div>
          <h1 style={{ color: 'var(--text-1)', fontWeight: 800, fontSize: 22, letterSpacing: '-0.3px', marginBottom: 12 }}>{title}</h1>
          <div className="flex gap-4 mb-6 pb-5 flex-wrap" style={{ borderBottom: '1px solid var(--border)' }}>
            {articleMeta.views && <span className="flex items-center gap-1.5" style={{ color: 'var(--text-3)', fontSize: 12 }}><Icon name="eye" size={13} />{(articleMeta.views/1000).toFixed(1)}K {S.viewsLabel}</span>}
            {articleMeta.likes && <span className="flex items-center gap-1.5" style={{ color: 'var(--text-3)', fontSize: 12 }}><Icon name="thumbUp" size={13} />{articleMeta.likes}</span>}
          </div>
          {translating
            ? <div style={{ color: 'var(--text-3)', fontSize: 14, padding: '20px 0', display: 'flex', alignItems: 'center', gap: 8 }}>

        {relatedArticles.length > 0 && (
          <div style={{ background: 'var(--surface)', border: '1.5px solid var(--border)', borderRadius: 14, padding: 20, boxShadow: 'var(--shadow)' }}>
            <p style={{ color: 'var(--text-1)', fontWeight: 700, fontSize: 14, marginBottom: 14 }}>{S.relatedArticles}</p>
            {relatedArticles.map((a, i) => {
              const rc = categories.find(c => c.id === a.catId);
              return (
                <div key={a.id} className="cursor-pointer flex items-center gap-3 py-2"
                  onClick={() => navigate({ view: 'article', articleId: a.id, catId: a.catId })}
                  style={{ borderBottom: i < relatedArticles.length-1 ? '1px solid var(--border)' : 'none' }}
                  onMouseEnter={e => e.currentTarget.style.opacity = '0.7'}
                  onMouseLeave={e => e.currentTarget.style.opacity = '1'}>
                  <span style={{ fontSize: 13, color: 'var(--text-2)', flex: 1, lineHeight: 1.4 }}>{lang === 'bn' ? (a.titleBn || a.title) : a.title}</span>
                  <Icon name="chevronRight" size={13} style={{ color: 'var(--text-3)', flexShrink: 0 }} />
                </div>

            })}

        )}
        <div style={{ background: 'var(--surface)', border: '1.5px solid var(--border)', borderRadius: 14, padding: 20, boxShadow: 'var(--shadow)' }}>
          <div className="flex items-center justify-between mb-4">
            <p style={{ color: 'var(--text-1)', fontWeight: 700, fontSize: 14 }}>{S.inThisCategory}</p>
            <span style={{ color: 'var(--accent)', fontSize: 12, cursor: 'pointer' }} onClick={() => navigate({ view: 'category', catId })}>{S.seeAll}</span>
          </div>
          {catArticles.slice(0,5).map((a, i) => (
            <div key={a.id} className="cursor-pointer flex items-center gap-2 py-2"
              onClick={() => navigate({ view: 'article', articleId: a.id, catId })}
              style={{ borderBottom: i < Math.min(4, catArticles.length-1) ? '1px solid var(--border)' : 'none' }}>
              {a.id === articleId && <div style={{ width: 3, height: 16, background: 'var(--accent)', borderRadius: 3, flexShrink: 0 }} />}
              <span style={{ fontSize: 13, lineHeight: 1.4, color: a.id === articleId ? 'var(--accent)' : 'var(--text-2)', fontWeight: a.id === articleId ? 600 : 400 }}>{lang === 'bn' ? (a.titleBn || a.title) : a.title}</span>
            </div>
          ))}
        </div>
        {/* Inline support CTA in sidebar */}
        <div style={{ background: 'var(--surface)', border: '1.5px solid var(--border)', borderRadius: 14, padding: 20, boxShadow: 'var(--shadow)' }}>
          <p style={{ color: 'var(--text-1)', fontWeight: 700, fontSize: 14, marginBottom: 6 }}>{S.needMoreHelp}</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <button onClick={openNuggetChat} className="btn-ghost flex items-center justify-center gap-2 rounded-lg w-full" style={{ padding: '8px 12px', fontSize: 13 }}>
              <Icon name="chat" size={14} /> {S.chatWithUs}
            </button>
            <button onClick={onOpenTicket} className="btn-primary flex items-center justify-center gap-2 rounded-lg w-full" style={{ padding: '8px 12px', fontSize: 13 }}>
              <Icon name="ticket" size={14} /> {S.raiseTicket}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

    <div className="fade-in">
      <div style={{ background: 'var(--surface)', borderBottom: '1.5px solid var(--border)', padding: '36px 24px 28px' }}>
        <div style={{ maxWidth: 1100, margin: '0 auto' }}>
          <p style={{ color: 'var(--accent)', fontSize: 12, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', marginBottom: 8 }}>{S.videosBadge}</p>

            <button key={f} onClick={() => setActiveFilter(f)}
              style={{ padding: '7px 16px', borderRadius: 999, fontSize: 13, fontWeight: 500, cursor: 'pointer', border: '1.5px solid', background: activeFilter === f ? 'linear-gradient(135deg,#d20820,#6d0550)' : 'var(--surface)', color: activeFilter === f ? '#fff' : 'var(--text-2)', borderColor: activeFilter === f ? 'transparent' : 'var(--border)' }}>
              {f === 'All' ? S.filterAll : f}

        </div>
        <div className="video-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: 18 }}>
          {filtered.map(v => (
            <div key={v.id} className="video-card cursor-pointer"
              style={{ background: 'var(--surface)', border: '1.5px solid var(--border)', borderRadius: 14, overflow: 'hidden', boxShadow: 'var(--shadow)', transition: 'transform 0.18s, box-shadow 0.18s' }}
              onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = 'var(--shadow-md)'; }}
              onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = 'var(--shadow)'; }}

                <div className="play-overlay" style={{ position: 'absolute', inset: 0, background: 'rgba(210,8,32,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <div style={{ width: 48, height: 48, borderRadius: '50%', background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Icon name="play" size={20} style={{ color: '#d20820', marginLeft: 3 }} />
                  </div>
                </div>
                <div style={{ position: 'absolute', bottom: 8, right: 10, background: 'rgba(0,0,0,0.75)', color: '#fff', fontSize: 11, fontWeight: 600, padding: '2px 7px', borderRadius: 6 }}>{v.duration}</div>
              </div>
              <div style={{ padding: '14px 16px' }}>
                <p style={{ color: 'var(--text-1)', fontWeight: 600, fontSize: 13, lineHeight: 1.4, marginBottom: 6 }}>{lang === 'bn' ? v.titleBn : v.title}</p>
                <div className="flex items-center justify-between">
                  <span className="tag-category" style={{ background: '#EFF6FF', color: '#2563EB', padding: '2px 8px', borderRadius: 999, fontSize: 11, fontWeight: 600 }}>{v.category}</span>
                  <span style={{ color: 'var(--text-3)', fontSize: 11 }}>{v.views}</span>

};

const SearchView = ({ query, navigate, lang, onOpenTicket, allArticles, categories }) => {
  const S = STRINGS[lang];
  const results = useMemo(() => {
    if (!query) return [];
    const q = query.toLowerCase();
    const titleHits = [], bodyHits = [];
    for (const a of allArticles) {
      const inTitle = a.title.toLowerCase().includes(q) || (a.titleBn && a.titleBn.includes(q));
      const inBody  = !inTitle && a.content && a.content.toLowerCase().includes(q);
      const item = { ...a, catId: (a.categories && a.categories[0]) || a.categoryId || a.category };
      if (inTitle) titleHits.push(item);
      else if (inBody) bodyHits.push(item);
    }
    return [...titleHits, ...bodyHits];
  }, [query, allArticles]);
  const cat = (cId) => categories.find(c => c.id === cId);
  return (
    <div className="fade-in" style={{ maxWidth: 900, margin: '0 auto', padding: '36px 24px 60px' }}>
      <p style={{ color: 'var(--text-3)', fontSize: 13, marginBottom: 24 }}>
        {results.length > 0 ? S.searchResultsText(results.length, query) : S.noResultsText(query)}
      </p>
      {results.length > 0 ? (
        <div style={{ background: 'var(--surface)', border: '1.5px solid var(--border)', borderRadius: 14, overflow: 'hidden', boxShadow: 'var(--shadow)' }}>
          {results.map((a, i) => (
            <div key={a.id} className="article-card cursor-pointer flex items-center gap-4"
              onClick={() => navigate({ view: 'article', articleId: a.id, catId: a.catId })}
              style={{ padding: '16px 20px', borderBottom: i < results.length-1 ? '1px solid var(--border)' : 'none', transition: 'background 0.15s' }}>
              <div style={{ flex: 1 }}>
                <div className="flex items-center gap-2 mb-1">
                  <span style={{ color: 'var(--text-1)', fontSize: 14, fontWeight: 600 }}>{lang === 'bn' ? a.titleBn : a.title}</span>
                  {a.tag && <span className={`tag ${a.tag === 'new' ? 'tag-new' : 'tag-popular'}`}>{a.tag}</span>}
                </div>
                <span style={{ color: 'var(--text-3)', fontSize: 12 }}>{cat(a.catId)?.label}</span>
              </div>
              <Icon name="chevronRight" size={15} style={{ color: 'var(--text-3)', flexShrink: 0 }} />
            </div>
          ))}
        </div>
      ) : (
        <div style={{ textAlign: 'center', padding: '60px 24px' }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🔍</div>
          <p style={{ color: 'var(--text-1)', fontWeight: 700, fontSize: 18, marginBottom: 8 }}>{S.noResultsHeading}</p>
          <p style={{ color: 'var(--text-2)', fontSize: 14, marginBottom: 28 }}>{S.tryDifferent}</p>
          <button className="btn-primary px-6 py-2.5 rounded-lg font-semibold cursor-pointer" onClick={() => navigate({ view: 'home' })}>{S.browseCategories}</button>
        </div>
      )}
      <div style={{ marginTop: 40 }}><SupportBar compact onOpenTicket={onOpenTicket} lang={lang} /></div>
    </div>
  );
};

// ── App ───────────────────────────────────────────────────────────────────────
// ── Hash routing helpers ──────────────────────────────────────────────────────
function navToHash(nav) {
  if (nav.view === 'home')       return '#home';
  if (nav.view === 'getstarted') return '#getstarted';
  if (nav.view === 'videos')     return '#videos';
  if (nav.view === 'category')   return `#category/${nav.catId}`;
  if (nav.view === 'article')    return `#article/${nav.articleId}/${nav.catId}`;
  if (nav.view === 'search')     return `#search/${encodeURIComponent(nav.query || '')}`;
  return '#home';
}
function hashToNav(hash) {
  const h = hash.replace(/^#/, '');
  if (!h || h === 'home')         return { view: 'home' };
  if (h === 'getstarted')         return { view: 'getstarted' };
  if (h === 'videos')             return { view: 'videos' };
  const parts = h.split('/');
  if (parts[0] === 'category')    return { view: 'category', catId: parts[1] };
  if (parts[0] === 'article')     return { view: 'article', articleId: parts[1], catId: parts[2] };
  if (parts[0] === 'search')      return { view: 'search', query: decodeURIComponent(parts[1] || '') };
  return { view: 'home' };
}

function App() {
  const [theme, setTheme] = useState('light');
  const [lang, setLang] = useState('en');
  const [nav, setNav] = useState(() => hashToNav(window.location.hash));
  const [showTicket, setShowTicket] = useState(false);
  const [allArticles, setAllArticles] = useState([]);
  const [popularArticles, setPopularArticles] = useState(POPULAR_ARTICLES);
  const [categories, setCategories] = useState(CATEGORIES);
  const [siteQuickSearches, setSiteQuickSearches] = useState(null);
  const [siteVideos, setSiteVideos] = useState(null);

  useEffect(() => {
    db.collection('articles').where('published', '==', true).get()
      .then(snap => setAllArticles(snap.docs.map(d => ({ id: d.id, ...d.data() }))))
      .catch(() => {});
  }, []);

  useEffect(() => {
    db.collection('siteConfig').doc('main').get()
      .then(doc => {
        if (!doc.exists) return;
        const data = doc.data();
        if (data.popularArticles) setPopularArticles(data.popularArticles);
        if (data.categories && data.categories.length > 0) setCategories(data.categories.filter(c => c.visible !== false));
        if (data.quickSearches && data.quickSearches.length > 0) setSiteQuickSearches(data.quickSearches);
        if (data.videos && data.videos.length > 0) setSiteVideos(data.videos);
      })
      .catch(() => {});
  }, []);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  // Sync hash → nav on browser back/forward
  useEffect(() => {
    const onHashChange = () => setNav(hashToNav(window.location.hash));
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  const navigate = useCallback((newNav) => {
    const hash = navToHash(newNav);
    window.history.pushState(null, '', hash);
    setNav(newNav);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const onOpenTicket = useCallback(() => setShowTicket(true), []);
  const viewProps = { navigate, lang, onOpenTicket, allArticles, popularArticles, categories, siteQuickSearches, siteVideos };

  const renderView = () => {
    switch (nav.view) {
      case 'home':       return <HomeView {...viewProps} />;
      case 'getstarted': return <GetStartedView {...viewProps} />;
      case 'category':   return <CategoryView catId={nav.catId} {...viewProps} />;
      case 'article':    return <ArticleView articleId={nav.articleId} catId={nav.catId} {...viewProps} />;
      case 'videos':     return <VideoLibraryView {...viewProps} />;
      case 'search':     return <SearchView query={nav.query || ''} {...viewProps} />;
      default:           return <HomeView {...viewProps} />;
    }
  };

  return (
    <>
      <Topbar theme={theme} setTheme={setTheme} lang={lang} setLang={setLang}
        navigate={navigate} onOpenTicket={onOpenTicket} currentView={nav.view} />
      {renderView()}
      {showTicket && <TicketModal onClose={() => setShowTicket(false)} lang={lang} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
